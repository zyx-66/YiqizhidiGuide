<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>遗弃之地 · 攻略助手</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <!-- 顶部导航 -->
    <header class="header">
        <div class="header-inner">
            <div class="logo">
                <span class="logo-icon">🪷</span>
                <span class="logo-text">遗弃之地</span>
                <span class="logo-sub">攻略助手</span>
            </div>
            <nav class="main-nav" id="mainNav">
                <button class="nav-btn active" data-tab="home">
                    <span class="nav-icon">🏠</span>
                    <span class="nav-label">首页大厅</span>
                </button>
                <button class="nav-btn" data-tab="levels">
                    <span class="nav-icon">🗺️</span>
                    <span class="nav-label">关卡攻略</span>
                </button>
                <button class="nav-btn" data-tab="compendium">
                    <span class="nav-icon">📖</span>
                    <span class="nav-label">图鉴大全</span>
                </button>
                <button class="nav-btn" data-tab="strategy">
                    <span class="nav-icon">💡</span>
                    <span class="nav-label">策略宝典</span>
                </button>
            </nav>
            <div class="header-search" id="headerSearch">
                <input type="text" class="search-input" id="globalSearch" placeholder="🔍 搜索攻略、天书、装备...">
                <div class="search-results" id="searchResults" style="display:none"></div>
            </div>
        </div>
    </header>

    <!-- 主内容区 -->
    <main class="main-content" id="mainContent">
        <!-- 内容由 JS 动态渲染 -->
    </main>

    <!-- 页脚 -->
    <footer class="footer">
        <p>遗弃之地攻略助手 — 数据整理自玩家社区攻略</p>
        <p class="footer-note">游戏版本持续更新中，攻略仅供参考 · 中式民俗恐怖 · 修法者指南</p>
    </footer>

    <!-- 关卡详情弹窗 -->
    <div class="modal-overlay" id="modalOverlay" style="display:none">
        <div class="modal-container" id="modalContainer">
            <button class="modal-close" id="modalClose">✕</button>
            <div class="modal-content" id="modalContent"></div>
        </div>
    </div>

    <script src="js/data.js"></script>
    <script src="js/components.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
